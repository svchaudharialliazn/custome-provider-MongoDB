apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: compositeorganizations.organization.mongodb.swapnil.io
spec:
  group: organization.mongodb.swapnil.io
  names:
    kind: CompositeOrganization
    plural: compositeorganizations
  claimNames:
    kind: OrganizationClaim
    plural: organizationclaims
  connectionSecretKeys:
    - publicKey
    - privateKey
    - secretARN
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  required: [ownerID, apiKey, networkAccessConfig, providerConfigRefName]
                  properties:
                    ownerID:
                      type: string
                    apiKey:
                      type: object
                      required: [description, roles]
                      properties:
                        description:
                          type: string
                        roles:
                          type: array
                          items:
                            type: string
                    awsSecretsConfig:
                      type: object
                      required: [region]
                      properties:
                        region:
                          type: string
                        secretName:
                          type: string
                        kmsKeyId:
                          type: string
                    networkAccessConfig:
                      type: object
                      required: [enabled, autoCleanup]
                      properties:
                        enabled:
                          type: boolean
                        autoCleanup:
                          type: boolean
                        apiAccessListRequired:
                          type: boolean
                        ips:
                          type: array
                          items:
                            type: object
                            required: [ip]
                            properties:
                              ip:
                                type: string
                              cidrBlock:
                                type: string
                              comment:
                                type: string
                    providerConfigRefName:
                      type: string
            status:
              type: object
              properties:
                atProvider:
                  type: object
                  properties:
                    orgID:
                      type: string
                    orgName:
                      type: string
                    state:
                      type: string
                    secretName:
                      type: string
                    secretARN:
                      type: string
                    apiKeyRoles:
                      type: array
                      items:
                        type: string
                    ipAccessEntryCount:
                      type: integer
                    ipAccessError:
                      type: string
                    enforcementError:
                      type: string
                    apiAccessListRequired:
                      type: boolean
                    lastEnforcementToggleTime:
                      type: string
                      format: date-time
                    lastIPAccessUpdate:
                      type: string
                      format: date-time
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - lastTransitionTime
                      - reason
                      - status
                      - type
                    properties:
                      lastTransitionTime:
                        type: string
                        format: date-time
                      message:
                        type: string
                      reason:
                        type: string
                      status:
                        type: string
                      type:
                        type: string


---
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: organization-mongodb
  labels:
    provider: mongodb
    type: organization
spec:
  compositeTypeRef:
    apiVersion: organization.mongodb.swapnil.io/v1alpha1
    kind: CompositeOrganization
  resources:
    - name: managed-organization
      base:
        apiVersion: organization.mongodb.swapnil.io/v1alpha1
        kind: Organization
        metadata:
          labels:
            managed-by: composition
        spec:
          forProvider: {}
          providerConfigRef:
            name: default
          deletionPolicy: Delete
          writeConnectionSecretToRef:
            namespace: crossplane-system
      patches:
        # Name patching
        - fromFieldPath: "metadata.name"
          toFieldPath: "metadata.name"
        - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
          toFieldPath: "metadata.name"
          policy:
            fromFieldPath: Optional

        # AWS Secrets Config
        - fromFieldPath: "metadata.name"
          toFieldPath: "spec.forProvider.awsSecretsConfig.secretName"
        - fromFieldPath: "spec.parameters.awsSecretsConfig.region"
          toFieldPath: "spec.forProvider.awsSecretsConfig.region"
        - fromFieldPath: "spec.parameters.awsSecretsConfig.secretName"
          toFieldPath: "spec.forProvider.awsSecretsConfig.secretName"
          policy:
            fromFieldPath: Optional
        - fromFieldPath: "spec.parameters.awsSecretsConfig.kmsKeyId"
          toFieldPath: "spec.forProvider.awsSecretsConfig.kmsKeyId"
          policy:
            fromFieldPath: Optional

        # Organization Config
        - fromFieldPath: "spec.parameters.ownerID"
          toFieldPath: "spec.forProvider.ownerID"
        - fromFieldPath: "spec.parameters.apiKey.description"
          toFieldPath: "spec.forProvider.apiKey.description"
        - fromFieldPath: "spec.parameters.apiKey.roles"
          toFieldPath: "spec.forProvider.apiKey.roles"

        # Network Access Config
        - fromFieldPath: "spec.parameters.networkAccessConfig.enabled"
          toFieldPath: "spec.forProvider.networkAccessConfig.enabled"
        - fromFieldPath: "spec.parameters.networkAccessConfig.autoCleanup"
          toFieldPath: "spec.forProvider.networkAccessConfig.autoCleanup"
        - fromFieldPath: "spec.parameters.networkAccessConfig.apiAccessListRequired"
          toFieldPath: "spec.forProvider.networkAccessConfig.apiAccessListRequired"
        - fromFieldPath: "spec.parameters.networkAccessConfig.ips"
          toFieldPath: "spec.forProvider.networkAccessConfig.ips"

        # Provider Config
        - fromFieldPath: "spec.parameters.providerConfigRefName"
          toFieldPath: "spec.providerConfigRef.name"

        # Connection Secret
        - fromFieldPath: "metadata.name"
          toFieldPath: "spec.writeConnectionSecretToRef.name"
        - fromFieldPath: "metadata.labels[crossplane.io/claim-name]"
          toFieldPath: "spec.writeConnectionSecretToRef.name"
          policy:
            fromFieldPath: Optional

        # Status Patches
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.orgID"
          toFieldPath: "status.atProvider.orgID"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.orgName"
          toFieldPath: "status.atProvider.orgName"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.state"
          toFieldPath: "status.atProvider.state"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.secretName"
          toFieldPath: "status.atProvider.secretName"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.secretARN"
          toFieldPath: "status.atProvider.secretARN"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.apiKeyRoles"
          toFieldPath: "status.atProvider.apiKeyRoles"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.ipAccessEntryCount"
          toFieldPath: "status.atProvider.ipAccessEntryCount"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.ipAccessError"
          toFieldPath: "status.atProvider.ipAccessError"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.enforcementError"
          toFieldPath: "status.atProvider.enforcementError"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.apiAccessListRequired"
          toFieldPath: "status.atProvider.apiAccessListRequired"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.lastEnforcementToggleTime"
          toFieldPath: "status.atProvider.lastEnforcementToggleTime"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.lastIPAccessUpdate"
          toFieldPath: "status.atProvider.lastIPAccessUpdate"

      connectionDetails:
        - fromConnectionSecretKey: publicKey
          name: publicKey
        - fromConnectionSecretKey: privateKey
          name: privateKey
        - fromConnectionSecretKey: secretARN
          name: secretARN

apiVersion: organization.mongodb.swapnil.io/v1alpha1
kind: OrganizationClaim
metadata:
  name: swap-v7
  namespace: default
spec:
  compositionSelector:
    matchLabels:
      provider: mongodb
      type: organization
  # XR/Claim parameters
  parameters:
    ownerID: "68933765952cea244d470efb"
    apiKey:
      description: "Pure AWS organization API key - no Kubernetes secrets"
      roles:
        - "ORG_OWNER"
    awsSecretsConfig:
      region: "eu-central-1"
      secretName: "swap-v7"
      kmsKeyId: "arn:aws:kms:eu-central-1:198927051560:key/50aed21c-4e38-4e62-9907-f35911304563"
    networkAccessConfig:
      enabled: true
      autoCleanup: true
      apiAccessListRequired: true

      ips:
        - ip: "63.180.117.9"
        - ip: "63.180.82.187"
        - ip: "167.103.20.121"
    providerConfigRefName: atlas-provider-aws-only

  # # Explicitly set the XR/Claim connection secret name and namespace
  # # so it is constant (equals the org/claim name) and avoids any suffixes.
  # writeConnectionSecretToRef:
  #   name: swap-v7
  #   namespace: crossplane-system

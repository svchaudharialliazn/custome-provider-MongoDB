                      type: string
                    type: array
                  createdAt:
                    format: date-time
                    type: string
                  createdWithAPIKeyID:
                    type: string
                  createdWithCredentialSource:
                    description: API key audit fields
                    type: string
                  deletedAt:
                    format: date-time
                    type: string
                  deletionAttemptCount:
                    type: integer
                  ipAccessEntryCount:
                    type: integer
                  ipAccessError:
                    type: string
                  kmsKeyId:
                    type: string
                  lastDeletionAttemptError:
                    type: string
                  lastDeletionAttemptTime:
                    description: Deletion tracking
                    format: date-time
                    type: string
                  lastIPAccessUpdate:
                    format: date-time
                    type: string
                  orgID:
                    type: string
                  orgName:
                    type: string
                  provisionedIPs:
                    description: IP access status
                    items:
                      description: IPAccessEntry represents a single IP address entry
                        in the access list
                      properties:
                        cidrBlock:
                          description: |-
                            CIDRBlock is the CIDR notation of the IP (always {IP}/32 for single IPs)
                            Make this optional so it's not required in spec; controller will populate in status.
                          type: string
                        comment:
                          description: |-
                            Comment is an optional description of the IP access

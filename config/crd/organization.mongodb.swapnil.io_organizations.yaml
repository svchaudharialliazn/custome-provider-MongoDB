---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: organizations.organization.mongodb.swapnil.io
spec:
  group: organization.mongodb.swapnil.io
  names:
    categories:
    - crossplane
    - managed
    - mongodb
    kind: Organization
    listKind: OrganizationList
    plural: organizations
    singular: organization
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .status.conditions[?(@.type=='Synced')].status
      name: SYNCED
      type: string
    - jsonPath: .status.atProvider.orgID
      name: ORG-ID
      type: string
    - jsonPath: .status.atProvider.state
      name: STATE
      type: string
    - jsonPath: .status.atProvider.secretName
      name: SECRET-NAME
      type: string
    - jsonPath: .status.atProvider.secretARN
      name: SECRET-ARN
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Organization is the Schema for the organizations API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: OrganizationSpec defines the desired state of Organization
            properties:
              deletionPolicy:
                default: Delete
                description: |-
                  DeletionPolicy specifies what will happen to the underlying external
                  when this managed resource is deleted - either "Delete" or "Orphan" the
                  external resource.
                  This field is planned to be deprecated in favor of the ManagementPolicies
                  field in a future release. Currently, both could be set independently and
                  non-default values would be honored if the feature flag is enabled.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                enum:
                - Orphan
                - Delete
                type: string
              forProvider:
                description: OrganizationParameters defines the desired state of the
                  Organization
                properties:
                  apiKey:
                    description: APIKey configuration for the organization
                    properties:
                      description:
                        description: Description for the API key
                        type: string
                      roles:
                        description: Roles assigned to the API key
                        items:
                          type: string
                        type: array
                    required:
                    - description
                    - roles
                    type: object
                  awsSecretsConfig:
                    description: AWSSecretsConfig defines where to store the API key
                      in AWS Secrets Manager
                    properties:
                      kmsKeyId:
                        description: Optional custom AWS KMS key.
                        type: string
                      region:
                        description: Region where the MongoDB API key secret will
                          be stored.
                        type: string
                      secretName:
                        description: |-
                          SecretName is appended to "product/mongodb/".
                          If omitted, defaults to metadata.name.
                        type: string
                    required:
                    - region
                    type: object
                  networkAccessConfig:
                    description: NetworkAccessConfig defines IP access provisioning
                    properties:
                      apiAccessListRequired:
                        description: |-
                          APIAccessListRequired enables Atlas organization-level enforcement:
                          "Require IP Access List for the Atlas Administration API".
                          When true, the controller will call PATCH /orgs/{orgId}/settings
                          to set apiAccessListRequired: true after org creation.
                        type: boolean
                      autoCleanup:
                        description: AutoCleanup determines if IPs should be removed
                          when org is deleted
                        type: boolean
                      enabled:
                        description: Enabled controls whether IP access provisioning
                          is active
                        type: boolean
                      ips:
                        description: IPs is the list of individual IP addresses to
                          whitelist
                        items:
                          description: IPAccessEntry represents a single IP address
                            in the access list
                          properties:
                            cidrBlock:
                              description: |-
                                CIDRBlock is the CIDR notation of the IP (always {IP}/32 for single IPs)
                                Optional: controller will populate in status.
                              type: string
                            comment:
                              description: Comment is an optional description of the
                                IP access
                              type: string
                            createdAt:
                              description: CreatedAt tracks when this IP was provisioned
                              format: date-time
                              type: string
                            ip:
                              description: IP is a single IPv4 address (e.g., "203.0.113.45")
                              type: string
                          required:
                          - ip
                          type: object
                        type: array
                    required:
                    - autoCleanup
                    - enabled
                    type: object
                  ownerID:
                    description: OwnerID is the MongoDB Atlas user ID who will own
                      the organization
                    type: string
                required:
                - apiKey
                - awsSecretsConfig
                - ownerID
                type: object
              managementPolicies:
                default:
                - '*'
                description: |-
                  THIS IS AN ALPHA FIELD. Do not use it in production. It is not honored
                  unless the relevant Crossplane feature flag is enabled, and may be
                  changed or removed without notice.
                  ManagementPolicies specify the array of actions Crossplane is allowed to
                  take on the managed and external resources.
                  This field is planned to replace the DeletionPolicy field in a future
                  release. Currently, both could be set independently and non-default
                  values would be honored if the feature flag is enabled. If both are
                  custom, the DeletionPolicy field will be ignored.
                  See the design doc for more information: https://github.com/crossplane/crossplane/blob/499895a25d1a1a0ba1604944ef98ac7a1a71f197/design/design-doc-observe-only-resources.md?plain=1#L223
                  and this one: https://github.com/crossplane/crossplane/blob/444267e84783136daa93568b364a5f01228cacbe/design/one-pager-ignore-changes.md
                items:
                  description: |-
                    A ManagementAction represents an action that the Crossplane controllers
                    can take on an external resource.
                  enum:
                  - Observe
                  - Create
                  - Update
                  - Delete
                  - LateInitialize
                  - '*'
                  type: string
                type: array
              providerConfigRef:
                default:
                  name: default
                description: |-
                  ProviderConfigReference specifies how the provider that will be used to
                  create, observe, update, and delete this managed resource should be
                  configured.
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              providerRef:
                description: |-
                  ProviderReference specifies the provider that will be used to create,
                  observe, update, and delete this managed resource.
                  Deprecated: Please use ProviderConfigReference, i.e. `providerConfigRef`
                properties:
                  name:
                    description: Name of the referenced object.
                    type: string
                  policy:
                    description: Policies for referencing.
                    properties:
                      resolution:
                        default: Required
                        description: |-
                          Resolution specifies whether resolution of this reference is required.
                          The default is 'Required', which means the reconcile will fail if the
                          reference cannot be resolved. 'Optional' means this reference will be
                          a no-op if it cannot be resolved.
                        enum:
                        - Required
                        - Optional
                        type: string
                      resolve:
                        description: |-
                          Resolve specifies when this reference should be resolved. The default
                          is 'IfNotPresent', which will attempt to resolve the reference only when
                          the corresponding field is not present. Use 'Always' to resolve the
                          reference on every reconcile.
                        enum:
                        - Always
                        - IfNotPresent
                        type: string
                    type: object
                required:
                - name
                type: object
              publishConnectionDetailsTo:
                description: |-
                  PublishConnectionDetailsTo specifies the connection secret config which
                  contains a name, metadata and a reference to secret store config to
                  which any connection details for this managed resource should be written.
                  Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                properties:
                  configRef:
                    default:
                      name: default
                    description: |-
                      SecretStoreConfigRef specifies which secret store config should be used
                      for this ConnectionSecret.
                    properties:
                      name:
                        description: Name of the referenced object.
                        type: string
                      policy:
                        description: Policies for referencing.
                        properties:
                          resolution:
                            default: Required
                            description: |-
                              Resolution specifies whether resolution of this reference is required.
                              The default is 'Required', which means the reconcile will fail if the
                              reference cannot be resolved. 'Optional' means this reference will be
                              a no-op if it cannot be resolved.
                            enum:
                            - Required
                            - Optional
                            type: string
                          resolve:
                            description: |-
                              Resolve specifies when this reference should be resolved. The default
                              is 'IfNotPresent', which will attempt to resolve the reference only when
                              the corresponding field is not present. Use 'Always' to resolve the
                              reference on every reconcile.
                            enum:
                            - Always
                            - IfNotPresent
                            type: string
                        type: object
                    required:
                    - name
                    type: object
                  metadata:
                    description: Metadata is the metadata for connection secret.
                    properties:
                      annotations:
                        additionalProperties:
                          type: string
                        description: |-
                          Annotations are the annotations to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.annotations".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      labels:
                        additionalProperties:
                          type: string
                        description: |-
                          Labels are the labels/tags to be added to connection secret.
                          - For Kubernetes secrets, this will be used as "metadata.labels".
                          - It is up to Secret Store implementation for others store types.
                        type: object
                      type:
                        description: |-
                          Type is the SecretType for the connection secret.
                          - Only valid for Kubernetes Secret Stores.
                        type: string
                    type: object
                  name:
                    description: Name is the name of the connection secret.
                    type: string
                required:
                - name
                type: object
              writeConnectionSecretToRef:
                description: |-
                  WriteConnectionSecretToReference specifies the namespace and name of a
                  Secret to which any connection details for this managed resource should
                  be written. Connection details frequently include the endpoint, username,
                  and password required to connect to the managed resource.
                  This field is planned to be replaced in a future release in favor of
                  PublishConnectionDetailsTo. Currently, both could be set independently
                  and connection details would be published to both without affecting
                  each other.
                properties:
                  name:
                    description: Name of the secret.
                    type: string
                  namespace:
                    description: Namespace of the secret.
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - forProvider
            type: object
          status:
            description: OrganizationStatus defines the observed state of Organization
            properties:
              atProvider:
                description: OrganizationObservation contains the observed state of
                  the Organization
                properties:
                  apiAccessListRequired:
                    description: APIAccessListRequired indicates whether IP access
                      list is required
                    type: boolean
                  apiKeyRoles:
                    description: APIKeyRoles are the roles assigned to the API key
                    items:
                      type: string
                    type: array
                  createdAt:
                    description: CreatedAt is when the organization was created
                    format: date-time
                    type: string
                  createdWithAPIKeyID:
                    description: CreatedWithAPIKeyID is the masked API key ID used
                      for creation
                    type: string
                  createdWithCredentialSource:
                    description: CreatedWithCredentialSource indicates the credential
                      source used (e.g., "AWS")
                    type: string
                  deletedAt:
                    description: DeletedAt is the timestamp when the organization
                      was deleted
                    format: date-time
                    type: string
                  deletionAttemptCount:
                    description: DeletionAttemptCount tracks how many times deletion
                      has been attempted
                    type: integer
                  deletionPhase:
                    description: DeletionPhase tracks the current phase of the deletion
                      state machine
                    type: string
                  dependenciesChecked:
                    description: DependenciesChecked indicates whether dependencies
                      have been checked
                    type: boolean
                  enforcementDisabledAt:
                    description: EnforcementDisabledAt is when apiAccessListRequired
                      was disabled during deletion
                    format: date-time
                    type: string
                  enforcementError:
                    description: EnforcementError contains any error from enforcement
                      operations
                    type: string
                  forceDeleteAfterFailures:
                    description: ForceDeleteAfterFailures indicates deletion failed
                      and force delete is available
                    type: boolean
                  ipAccessEntryCount:
                    description: IPAccessEntryCount is the number of IPs in the access
                      list
                    type: integer
                  ipAccessError:
                    description: IPAccessError contains any error from IP access list
                      operations
                    type: string
                  ipsCleanedUp:
                    description: IPsCleanedUp indicates whether IPs have been cleaned
                      up during deletion
                    type: boolean
                  kmsKeyId:
                    description: KMSKeyID is the KMS key used to encrypt the secret
                      (optional informational field)
                    type: string
                  lastDeletionAttemptError:
                    description: LastDeletionAttemptError contains the error message
                      from the last deletion attempt
                    type: string
                  lastDeletionAttemptTime:
                    description: LastDeletionAttemptTime is the timestamp of the last
                      deletion attempt
                    format: date-time
                    type: string
                  lastEnforcementToggleTime:
                    description: LastEnforcementToggleTime is when apiAccessListRequired
                      was last changed
                    format: date-time
                    type: string
                  lastIPAccessUpdate:
                    description: LastIPAccessUpdate is the timestamp of the last IP
                      access list update
                    format: date-time
                    type: string
                  lastRateLimitHitTime:
                    description: LastRateLimitHitTime is when the last rate limit
                      (429) was encountered
                    format: date-time
                    type: string
                  orgID:
                    description: OrgID is the MongoDB Atlas organization ID
                    type: string
                  orgName:
                    description: OrgName is the name of the organization
                    type: string
                  provisionedIPs:
                    description: |-
                      ===============================================================
                      IP Access Status
                      ===============================================================
                      ProvisionedIPs is the list of IPs provisioned to the access list
                    items:
                      description: IPAccessEntry represents a single IP address in
                        the access list
                      properties:
                        cidrBlock:
                          description: |-
                            CIDRBlock is the CIDR notation of the IP (always {IP}/32 for single IPs)
                            Optional: controller will populate in status.
                          type: string
                        comment:
                          description: Comment is an optional description of the IP
                            access
                          type: string
                        createdAt:
                          description: CreatedAt tracks when this IP was provisioned
                          format: date-time
                          type: string
                        ip:
                          description: IP is a single IPv4 address (e.g., "203.0.113.45")
                          type: string
                      required:
                      - ip
                      type: object
                    type: array
                  secretARN:
                    description: SecretARN is the ARN of the AWS secret
                    type: string
                  secretName:
                    description: SecretName is the name of the AWS secret
                    type: string
                  state:
                    description: State represents the current state (PENDING, ACTIVE,
                      DELETING, DELETED)
                    type: string
                type: object
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
